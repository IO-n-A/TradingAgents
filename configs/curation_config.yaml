# Instruction template for the JSONL output.
# This will be used by curate_news_for_sentiment_finetuning.py to format the data.
# The instruction should be suitable for a sentiment analysis task.
jsonl_instruction_template: "What is the sentiment of the following news article regarding US equities? Options: positive, negative, neutral."

