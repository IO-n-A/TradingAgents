# Configuration for news data curation for sentiment fine-tuning

# Date range for filtering news articles (inclusive)
# These are placeholders and should be set according to the specific curation task.
date_range:
  start_date: "2023-01-01" # Example: YYYY-MM-DD
  end_date: "2023-12-31"   # Example: YYYY-MM-DD

